# Base de datos H2 en memoria para tests (no toca la BD real)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate crea y destruye las tablas automáticamente en cada test
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# JWT para tests
app.jwt.secret=test_clave_secreta_para_tests_jwt_2024
app.jwt.expiration=86400000

# Email falso para tests (no envía correos reales)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=test@test.com
spring.mail.password=testpassword
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.admin.email=admin@test.com
app.frontend.url=http://localhost:4200

// Evitar palabras reservadas de H2
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.globally_quoted_identifiers_skip_column_definitions=true
