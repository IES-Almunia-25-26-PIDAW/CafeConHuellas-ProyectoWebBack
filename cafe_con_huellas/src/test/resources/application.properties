# Base de datos H2 en memoria para tests (no toca la BD real)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate crea y destruye las tablas automáticamente en cada test
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# JWT para tests
app.jwt.secret=test_clave_secreta_para_tests_jwt_2024
app.jwt.expiration=900000
app.jwt.refresh-expiration=604800000

# Email falso para tests (no envía correos reales)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test@localhost
spring.mail.password=

# Evitar palabras reservadas de H2
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.globally_quoted_identifiers_skip_column_definitions=true

#  Evitar conflicto en liquibase
spring.liquibase.enabled=false