spring.application.name=cafe_con_huellas

# Configuración base de datos:
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/animal_shelter_db?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# Configuración JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Configuración del servidor
server.port=8087
server.error.include-message=always

# Formato de fechas (JSON / DATES)
# spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Europe/Madrid

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Clave secreta para firmar tokens JWT
app.jwt.secret=cafe_con_huellas_clave_secreta_super_segura_2024

# Tiempo de expiración del token en milisegundos (15 minutos)
app.jwt.expiration=900000
# Refresh token: largo (7 días)
app.jwt.refresh-expiration=604800000

# Configuración Gmail SMTP
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Email del administrador que recibirá las notificaciones
app.admin.email=${MAIL_USERNAME}

# URL base del frontend para construir los enlaces del formulario
app.frontend.url=http://localhost:4200

# Liquibase: gestión de migraciones de base de datos
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml